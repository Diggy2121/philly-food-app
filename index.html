<!DOCTYPE html>
<html>
<head>
  <title>Philly Food Map (Offline)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    .panel {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      background:white;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>
<body>

<div class="panel">
  Philly Food Map (Offline)
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.9526, -75.1652], 13);

// Map tiles (need internet first time, then cached)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔵 RESTAURANTS
const restaurants = [
  ["Osteria", 39.968, -75.160],
  ["Murphs", 39.969, -75.135],
  ["Pizzeria Beddia", 39.965, -75.135],
  ["Laser Wolf", 39.968, -75.135],
  ["Suraya", 39.968, -75.135],
  ["Kalaya", 39.967, -75.135],
  ["El Vez", 39.950, -75.170],
  ["Dan Dan", 39.950, -75.168],
  ["Victor Cafe", 39.933, -75.157],
  ["Fiorella", 39.948, -75.145]
];

// 🔴 BARS
const bars = [
  ["Harp & Crown", 39.949, -75.165],
  ["Walnut Beer Garden", 39.948, -75.170],
  ["Jerry’s Bar", 39.940, -75.155],
  ["Sidecar", 39.943, -75.158],
  ["Sardine Bar", 39.933, -75.157]
];

// ADD BLUE DOTS
restaurants.forEach(r => {
  L.circleMarker([r[1], r[2]], {
    color: "blue",
    fillColor: "blue",
    fillOpacity: 1,
    radius: 6
  }).addTo(map)
    .bindPopup(`<b>${r[0]}</b><br>
    <a href="https://www.google.com/maps/search/${r[0]}" target="_blank">Open in Maps</a>`);
});

// ADD RED DOTS
bars.forEach(b => {
  L.circleMarker([b[1], b[2]], {
    color: "red",
    fillColor: "red",
    fillOpacity: 1,
    radius: 6
  }).addTo(map)
    .bindPopup(`<b>${b[0]}</b><br>
    <a href="https://www.google.com/maps/search/${b[0]}" target="_blank">Open in Maps</a>`);
});
</script>

</body>
</html>
