<!DOCTYPE html>
<html>
<head>
  <title>Philly Food Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family: -apple-system; }
    #map { height:100vh; }

    .panel {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      background:white;
      padding:12px;
      border-radius:12px;
      width:260px;
      box-shadow:0 6px 18px rgba(0,0,0,0.2);
    }

    input, select, button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border-radius:8px;
    }

    button {
      background:black;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="panel">
  <input id="search" placeholder="Search...">

  <select id="neighborhood" onchange="addMarkers()">
    <option value="all">All Neighborhoods</option>
    <option value="center">Center City</option>
    <option value="fishtown">Fishtown</option>
    <option value="south">South Philly</option>
    <option value="west">West Philly</option>
  </select>

  <button onclick="toggleBars()">🍸 Toggle Bars</button>
  <button onclick="openForm()">➕ Add Location</button>
</div>

<div id="map"></div>

<!-- FORM MODAL -->
<div id="formModal" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000;">
  <div style="background:white; margin:80px auto; padding:20px; width:90%; max-width:320px; border-radius:12px;">
    <h3>Add Location</h3>

    <input id="placeName" placeholder="Name">

    <select id="placeType">
      <option value="restaurant">Restaurant</option>
      <option value="bar">Bar</option>
    </select>

    <select id="placeArea">
      <option value="center">Center City</option>
      <option value="fishtown">Fishtown</option>
      <option value="south">South Philly</option>
      <option value="west">West Philly</option>
    </select>

    <button onclick="savePlace()">Save</button>
    <button onclick="closeForm()" style="background:gray;">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
const map = L.map('map').setView([39.9526, -75.1652], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];
let showBars = true;

// NEIGHBORHOOD CENTERS
const centers = {
  center: [39.9526, -75.1652],
  fishtown: [39.969, -75.135],
  south: [39.933, -75.160],
  west: [39.960, -75.200]
};

// RESTAURANTS
const restaurants = {
  center: ["El Vez","Tria","Pizzeria Vetri","Amada","Rouge"],
  fishtown: ["Laser Wolf","Suraya","Kalaya","Pizzeria Beddia"],
  south: ["Victor Cafe","Villa Di Roma","Ralph’s","Dante & Luigi’s"],
  west: ["White Dog Cafe","Han Dynasty"]
};

// BARS
const bars = {
  center: ["Harp & Crown","Franklin Mortgage"],
  fishtown: ["Johnny Brenda’s","Next of Kin"],
  south: ["Tap Room"],
  west: ["Dock Street"]
};

// LOAD CUSTOM DATA
let customRestaurants = JSON.parse(localStorage.getItem("restaurants") || "{}");
let customBars = JSON.parse(localStorage.getItem("bars") || "{}");

function saveData() {
  localStorage.setItem("restaurants", JSON.stringify(customRestaurants));
  localStorage.setItem("bars", JSON.stringify(customBars));
}

// RANDOM OFFSET
function offset(base) {
  return [
    base[0] + (Math.random() - 0.5) * 0.01,
    base[1] + (Math.random() - 0.5) * 0.01
  ];
}

// ADD MARKERS
function addMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const search = document.getElementById("search").value.toLowerCase();
  const selected = document.getElementById("neighborhood").value;

  // DEFAULT RESTAURANTS
  Object.keys(restaurants).forEach(area => {
    if (selected !== "all" && selected !== area) return;

    restaurants[area].forEach(name => {
      if (!name.toLowerCase().includes(search)) return;

      const marker = L.circleMarker(offset(centers[area]), {
        color:"blue", fillColor:"blue", radius:6, fillOpacity:1
      }).addTo(map);

      marker.bindPopup(`<b>${name}</b>`);
      markers.push(marker);
    });
  });

  // DEFAULT BARS
  if (showBars) {
    Object.keys(bars).forEach(area => {
      if (selected !== "all" && selected !== area) return;

      bars[area].forEach(name => {
        if (!name.toLowerCase().includes(search)) return;

        const marker = L.circleMarker(offset(centers[area]), {
          color:"red", fillColor:"red", radius:6, fillOpacity:1
        }).addTo(map);

        marker.bindPopup(`<b>${name}</b>`);
        markers.push(marker);
      });
    });
  }

  // CUSTOM RESTAURANTS
  Object.keys(customRestaurants).forEach(area => {
    customRestaurants[area].forEach(name => {
      const marker = L.circleMarker(offset(centers[area]), {
        color:"blue", fillColor:"blue", radius:6, fillOpacity:1
      }).addTo(map);

      marker.bindPopup(`<b>${name}</b> (custom)`);
      markers.push(marker);
    });
  });

  // CUSTOM BARS
  if (showBars) {
    Object.keys(customBars).forEach(area => {
      customBars[area].forEach(name => {
        const marker = L.circleMarker(offset(centers[area]), {
          color:"red", fillColor:"red", radius:6, fillOpacity:1
        }).addTo(map);

        marker.bindPopup(`<b>${name}</b> (custom)`);
        markers.push(marker);
      });
    });
  }
}

// SEARCH
document.getElementById("search").addEventListener("input", addMarkers);

// TOGGLE
function toggleBars() {
  showBars = !showBars;
  addMarkers();
}

// FORM
function openForm() {
  document.getElementById("formModal").style.display = "block";
}

function closeForm() {
  document.getElementById("formModal").style.display = "none";
}

// SAVE PLACE
function savePlace() {
  const name = document.getElementById("placeName").value;
  const type = document.getElementById("placeType").value;
  const area = document.getElementById("placeArea").value;

  if (!name) {
    alert("Enter a name");
    return;
  }

  if (type === "restaurant") {
    if (!customRestaurants[area]) customRestaurants[area] = [];
    customRestaurants[area].push(name);
  } else {
    if (!customBars[area]) customBars[area] = [];
    customBars[area].push(name);
  }

  saveData();
  closeForm();
  addMarkers();
  document.getElementById("placeName").value = "";
}

// INIT
addMarkers();
</script>

</body>
</html>
