<!DOCTYPE html>
<html>
<head>
  <title>Philly Food Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:-apple-system; }
    #map { height:100vh; }

    .panel {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      background:white;
      padding:12px;
      border-radius:12px;
      width:260px;
      box-shadow:0 6px 18px rgba(0,0,0,0.2);
    }

    input, select, button {
      width:100%;
      padding:8px;
      margin-top:6px;
      border-radius:8px;
    }

    button {
      background:black;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="panel">
  <input id="search" placeholder="Search...">
  <button onclick="toggleBars()">🍸 Toggle Bars</button>
  <button onclick="openForm()">➕ Add Location</button>
</div>

<div id="map"></div>

<!-- FORM -->
<div id="formModal" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000;">
  <div style="background:white; margin:80px auto; padding:20px; width:90%; max-width:320px; border-radius:12px;">
    <h3>Add Location</h3>
    <input id="placeName" placeholder="Name">
    <select id="placeType">
      <option value="restaurant">Restaurant</option>
      <option value="bar">Bar</option>
    </select>
    <button onclick="savePlace()">Save</button>
    <button onclick="closeForm()" style="background:gray;">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.9526, -75.1652], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];
let showBars = true;

// ✅ REAL LOCATIONS (core + expanded)
const places = [
  {name:"Osteria", lat:39.9681, lng:-75.1607, type:"restaurant"},
  {name:"Murphs", lat:39.9696, lng:-75.1348, type:"restaurant"},
  {name:"Pizzeria Beddia", lat:39.9656, lng:-75.1340, type:"restaurant"},
  {name:"Laser Wolf", lat:39.9682, lng:-75.1355, type:"restaurant"},
  {name:"Suraya", lat:39.9684, lng:-75.1350, type:"restaurant"},
  {name:"Kalaya", lat:39.9677, lng:-75.1349, type:"restaurant"},
  {name:"El Vez", lat:39.9495, lng:-75.1700, type:"restaurant"},
  {name:"Dan Dan", lat:39.9506, lng:-75.1680, type:"restaurant"},
  {name:"Victor Cafe", lat:39.9330, lng:-75.1570, type:"restaurant"},
  {name:"Fiorella", lat:39.9485, lng:-75.1455, type:"restaurant"},
  {name:"Dante & Luigi’s", lat:39.9412, lng:-75.1505, type:"restaurant"},
  {name:"Ralph’s", lat:39.9410, lng:-75.1500, type:"restaurant"},
  {name:"Villa Di Roma", lat:39.9405, lng:-75.1510, type:"restaurant"},
  {name:"Saloon", lat:39.9398, lng:-75.1560, type:"restaurant"},
  {name:"South Philly Barbacoa", lat:39.9342, lng:-75.1625, type:"restaurant"},
  {name:"Amada", lat:39.9499, lng:-75.1446, type:"restaurant"},
  {name:"Tria", lat:39.9508, lng:-75.1704, type:"restaurant"},
  {name:"Pizzeria Vetri", lat:39.9493, lng:-75.1733, type:"restaurant"},
  {name:"Rouge", lat:39.9490, lng:-75.1738, type:"restaurant"},
  {name:"Pub & Kitchen", lat:39.9450, lng:-75.1710, type:"restaurant"},

  {name:"Harp & Crown", lat:39.9490, lng:-75.1652, type:"bar"},
  {name:"Walnut Beer Garden", lat:39.9483, lng:-75.1705, type:"bar"},
  {name:"Jerry’s Bar", lat:39.9402, lng:-75.1550, type:"bar"},
  {name:"Sidecar", lat:39.9433, lng:-75.1582, type:"bar"},
  {name:"Sardine Bar", lat:39.9335, lng:-75.1572, type:"bar"},
  {name:"Franklin Mortgage", lat:39.9503, lng:-75.1695, type:"bar"},
  {name:"Dock Street", lat:39.9570, lng:-75.1990, type:"bar"},
  {name:"Grace Tavern", lat:39.9418, lng:-75.1570, type:"bar"},
  {name:"Next of Kin", lat:39.9650, lng:-75.1355, type:"bar"},
  {name:"Johnny Brenda’s", lat:39.9695, lng:-75.1345, type:"bar"}
];

// CUSTOM STORAGE
let custom = JSON.parse(localStorage.getItem("custom") || "[]");

function saveData() {
  localStorage.setItem("custom", JSON.stringify(custom));
}

// ADD MARKERS
function addMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const search = document.getElementById("search").value.toLowerCase();

  [...places, ...custom].forEach(p => {
    if (!p.name.toLowerCase().includes(search)) return;
    if (!showBars && p.type === "bar") return;

    const marker = L.circleMarker([p.lat, p.lng], {
      color: p.type === "bar" ? "red" : "blue",
      fillColor: p.type === "bar" ? "red" : "blue",
      radius: 6,
      fillOpacity: 1
    }).addTo(map);

    marker.bindPopup(`<b>${p.name}</b><br>${p.type}`);
    markers.push(marker);
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", addMarkers);

// TOGGLE
function toggleBars() {
  showBars = !showBars;
  addMarkers();
}

// FORM
function openForm() {
  document.getElementById("formModal").style.display = "block";
}
function closeForm() {
  document.getElementById("formModal").style.display = "none";
}

// SAVE CUSTOM PLACE (drops at center for now)
function savePlace() {
  const name = document.getElementById("placeName").value;
  const type = document.getElementById("placeType").value;

  if (!name) return alert("Enter name");

  custom.push({
    name,
    type,
    lat: map.getCenter().lat,
    lng: map.getCenter().lng
  });

  saveData();
  closeForm();
  addMarkers();
}

// INIT
addMarkers();
</script>

</body>
</html>
